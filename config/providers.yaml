# astock-analysis provider configuration
# =========================================
#
# providers:
#   Each provider has retry/circuit-breaker settings.
#   - retry_count: Max attempts per call (default 3)
#   - backoff_base: Exponential backoff multiplier (default 2.0)
#   - circuit_breaker_threshold: Consecutive failures before opening circuit (default 5)
#   - cooldown_seconds: How long the circuit stays open (default 300)
#
# dimensions:
#   Each dimension lists providers in priority order (first = highest priority).
#   Only providers listed here will be attempted for this dimension.
#
# cache_enabled:
#   Master switch for the SQLite cache layer.

cache_enabled: true

providers:
  akshare:
    retry_count: 3
    backoff_base: 2.0
    circuit_breaker_threshold: 5
    cooldown_seconds: 300

  # Future providers — uncomment and configure when ready:
  #
  # tushare:
  #   retry_count: 2
  #   backoff_base: 1.5
  #   circuit_breaker_threshold: 3
  #   cooldown_seconds: 600
  #
  # efinance:
  #   retry_count: 3
  #   backoff_base: 2.0
  #   circuit_breaker_threshold: 5
  #   cooldown_seconds: 300
  #
  # baostock:
  #   retry_count: 2
  #   backoff_base: 1.5
  #   circuit_breaker_threshold: 3
  #   cooldown_seconds: 600

dimensions:
  # ── Price & Quote ──────────────────────────────────────────
  kline:
    providers:
      - akshare

  realtime:
    providers:
      - akshare

  # ── Fundamental ────────────────────────────────────────────
  financials:
    providers:
      - akshare

  stock_info:
    providers:
      - akshare

  holder:
    providers:
      - akshare

  # ── Fund Flow ──────────────────────────────────────────────
  capital_flow:
    providers:
      - akshare

  north_flow:
    providers:
      - akshare

  margin:
    providers:
      - akshare

  # ── Market Data ────────────────────────────────────────────
  index:
    providers:
      - akshare

  industry:
    providers:
      - akshare

  concept:
    providers:
      - akshare

  # ── Trading Activity ───────────────────────────────────────
  lhb:
    providers:
      - akshare

  block_trade:
    providers:
      - akshare

  # ── Sentiment & News ───────────────────────────────────────
  sentiment:
    providers:
      - akshare

  news:
    providers:
      - akshare

  # ── Derivatives & Special ──────────────────────────────────
  fund:
    providers:
      - akshare

  ipo:
    providers:
      - akshare

  futures:
